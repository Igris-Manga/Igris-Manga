<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igris Manga | تفاصيل العمل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #7d2ae8; --bg: #050505; --card: #111; --fire: #ff4500; --red: #ff4d4d; --gold: #ffcc00; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        
        /* التنسيقات العلوية */
        .top-nav { max-width: 900px; margin: 10px auto; display: flex; justify-content: space-between; align-items: center; }
        .back-home { text-decoration: none; color: var(--p); border: 1px solid var(--p); padding: 5px 15px; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .back-home:hover { background: var(--p); color: #fff; }

        /* الهيدر الاحترافي */
        .manga-header { max-width: 900px; margin: 0 auto 20px; display: flex; gap: 20px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; align-items: flex-start; flex-wrap: wrap; }
        .manga-header img { width: 160px; height: 240px; object-fit: cover; border-radius: 12px; border: 2px solid var(--p); box-shadow: 0 0 15px rgba(125, 42, 232, 0.3); }
        .manga-details { flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 10px; }
        .manga-details h1 { margin: 0; color: var(--p); font-size: 2rem; font-weight: 900; }
        
        .info-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .tag { background: #1a1a1a; color: #eee; padding: 4px 12px; border-radius: 6px; font-size: 0.8rem; border: 1px solid #333; }
        .tag.status { border-color: var(--p); color: var(--p); font-weight: bold; }
        .tag.type { background: #fff; color: #000; font-weight: bold; }

        /* النجوم */
        .rating-stars { color: #444; font-size: 1.5rem; cursor: pointer; }
        .rating-stars span.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        /* قائمة الفصول */
        .section-title { max-width: 900px; margin: 30px auto 15px; display: flex; align-items: center; gap: 10px; color: var(--p); font-weight: 900; }
        .chapters-list { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        .chapter-item { background: var(--card); padding: 15px 25px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: #fff; border-right: 4px solid var(--p); transition: 0.3s; }
        .chapter-item:hover { background: #1a1a1a; transform: translateX(-5px); }
        .ch-num { font-weight: bold; font-size: 1.1rem; }

        /* لوحة المدير للرفع (مخفية تظهر للمدير فقط) */
        #adminPanel { max-width: 900px; margin: 20px auto; background: #1a0a2a; padding: 20px; border-radius: 15px; border: 1px dashed var(--p); display: none; }
        #adminPanel input, #adminPanel textarea { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid var(--p); color: #fff; border-radius: 8px; font-family: 'Cairo'; box-sizing: border-box; }
        .upload-btn { background: var(--p); color: #fff; border: none; padding: 10px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        #loading { text-align: center; padding: 40px; color: var(--p); }

        @media (max-width: 600px) {
            .manga-header { flex-direction: column; align-items: center; text-align: center; }
            .info-row { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="back-home"><i class="fas fa-home"></i> الرئيسية</a>
        <div id="adminBadge" style="display:none; color:var(--red); font-weight:bold;"><i class="fas fa-user-shield"></i> وضع المطور</div>
    </div>

    <div id="mangaContent">
        <div class="manga-header">
            <img id="mangaImg" src="" alt="Cover">
            <div class="manga-details">
                <h1 id="mangaTitle">جاري التحميل...</h1>
                <div class="info-row">
                    <span class="tag type" id="mangaType">...</span>
                    <span class="tag status" id="mangaStatus">...</span>
                </div>
                <div class="info-row" id="mangaGenres">
                    </div>
                <div id="mangaDesc" style="color:#bbb; font-size:0.9rem; line-height:1.6;">...</div>
                
                <div class="rating-stars" id="stars">
                    <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
                </div>
            </div>
        </div>

        <div id="adminPanel">
            <h3 style="margin-top:0"><i class="fas fa-plus-circle"></i> إضافة فصل جديد لهذه المانجا</h3>
            <input type="number" id="chapNumber" placeholder="رقم الفصل (مثلاً: 5)">
            <textarea id="imagesLinks" rows="5" placeholder="ألصق روابط الصور هنا (كل رابط في سطر منفصل)"></textarea>
            <button class="upload-btn" onclick="uploadChapter()">نشر الفصل الآن 🚀</button>
        </div>

        <div class="section-title">
            <i class="fas fa-list-ul"></i> قائمة الفصول
        </div>
        
        <div id="loading" class="loading">جاري جلب الفصول... ⏳</div>
        <div class="chapters-list" id="chaptersContainer">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDaosiZQoPCo4wdlSDy6UYs0b2PWbkkWXs",
          authDomain: "igrismanga-db.firebaseapp.com",
          databaseURL: "https://igrismanga-db-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "igrismanga-db",
          storageBucket: "igrismanga-db.appspot.com",
          appId: "1:40861137290:web:03cd9be7175620d4e23073"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // 1. تحديد أي مانهوا نعرض بناءً على الرابط (مثلاً: manga.html?id=solo-leveling)
        const urlParams = new URLSearchParams(window.location.search);
        const mangaId = urlParams.get('id');
        const adminEmail = "almsmmalmhtrf22@gmail.com";

        if (!mangaId) { window.location.href = 'index.html'; }

        // 2. التحقق من صلاحيات المدير
        onAuthStateChanged(auth, user => {
            if (user && user.email === adminEmail) {
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('adminBadge').style.display = 'block';
            }
        });

        // 3. جلب بيانات المانجا من Firebase
        onValue(ref(db, `manga/${mangaId}`), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('mangaTitle').textContent = data.title;
                document.getElementById('mangaImg').src = data.cover || 'default-cover.jpg';
                document.getElementById('mangaType').textContent = data.type || 'مانهوا';
                document.getElementById('mangaStatus').textContent = data.status || 'مستمرة';
                document.getElementById('mangaDesc').textContent = data.description || 'لا يوجد وصف متاح حالياً.';
                
                // عرض التصنيفات
                if (data.genres) {
                    const genresDiv = document.getElementById('mangaGenres');
                    genresDiv.innerHTML = data.genres.map(g => `<span class="tag">${g}</span>`).join('');
                }

                // عرض الفصول
                const chaptersDiv = document.getElementById('chaptersContainer');
                chaptersDiv.innerHTML = '';
                document.getElementById('loading').style.display = 'none';

                if (data.chapters) {
                    // ترتيب الفصول من الأحدث للأقدم
                    const sortedChaps = Object.keys(data.chapters).sort((a,b) => b - a);
                    sortedChaps.forEach(num => {
                        chaptersDiv.innerHTML += `
                            <a href="reader.html?id=${mangaId}&ch=${num}" class="chapter-item">
                                <span class="ch-num">الفصل ${num}</span>
                                <span style="color:#666; font-size:0.8rem;">بواسطة Igris <i class="fas fa-chevron-left"></i></span>
                            </a>
                        `;
                    });
                } else {
                    chaptersDiv.innerHTML = '<p style="text-align:center; color:#666;">لا توجد فصول مرفوعة حالياً.</p>';
                }
            }
        });

        // 4. وظيفة الرفع (للمدير)
        window.uploadChapter = async function() {
            const num = document.getElementById('chapNumber').value;
            const links = document.getElementById('imagesLinks').value.split('\n').filter(l => l.trim());

            if (!num || links.length === 0) return alert("أدخل رقم الفصل والروابط!");

            try {
                await set(ref(db, `manga/${mangaId}/chapters/${num}`), links);
                alert(`تم نشر الفصل ${num} بنجاح!`);
                document.getElementById('imagesLinks').value = '';
                document.getElementById('chapNumber').value = '';
            } catch (e) {
                alert("خطأ في الرفع: " + e.message);
            }
        };

        // 5. نظام التقييم البسيط (محلي)
        const stars = document.querySelectorAll('#stars span');
        stars.forEach(star => {
            star.onclick = () => {
                let val = star.getAttribute('data-v');
                stars.forEach(s => s.classList.remove('active'));
                for(let i=0; i<val; i++) stars[i].classList.add('active');
                localStorage.setItem(`rating_${mangaId}`, val);
            };
        });
    </script>
</body>
</html>
