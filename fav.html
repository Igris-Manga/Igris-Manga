<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igris Manga | المفضلات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --p: #7d2ae8; --bg: #050505; --card: #111; 
            --text: #fff; --border: #222; --sub-bg: #151515;
            --glow: 0 0 20px rgba(125, 42, 232, 0.2);
            --red: #ff4d4d;
        }

        [data-theme="light"] {
            --bg: #f5f5f5; --card: #ffffff; --text: #1a1a1a; 
            --border: #e0e0e0; --sub-bg: #eeeeee;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; 
            margin: 0; padding: 0; transition: 0.3s; min-height: 100vh;
        }

        header { 
            background: var(--card); padding: 15px 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 1.5rem; font-weight: 900; color: var(--p); text-decoration: none; }
        .logo span { color: var(--red); }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

        .back-btn { 
            display: inline-flex; align-items: center; gap: 8px; 
            color: var(--text); text-decoration: none; margin-bottom: 20px; 
            font-size: 0.9rem; opacity: 0.8; transition: 0.3s;
        }
        .back-btn:hover { color: var(--p); opacity: 1; transform: translateX(-5px); }

        .page-title {
            display: flex; align-items: center; gap: 15px; margin-bottom: 30px;
        }
        .page-title i { color: var(--red); font-size: 1.8rem; text-shadow: 0 0 10px rgba(255, 77, 77, 0.3); }

        /* شبكة المفضلات */
        .fav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .fav-item {
            background: var(--card); border-radius: 15px; overflow: hidden;
            border: 1px solid var(--border); transition: 0.4s; position: relative;
            text-decoration: none; color: inherit;
        }

        .fav-item:hover {
            transform: translateY(-10px); border-color: var(--p);
            box-shadow: var(--glow);
        }

        .fav-poster { width: 100%; height: 230px; position: relative; }
        .fav-poster img { width: 100%; height: 100%; object-fit: cover; }
        
        .remove-btn {
            position: absolute; top: 10px; left: 10px; width: 35px; height: 35px;
            background: rgba(255, 77, 77, 0.9); border: none; border-radius: 10px;
            color: white; cursor: pointer; z-index: 10; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .remove-btn:hover { background: var(--red); transform: scale(1.1); }

        .fav-info { padding: 12px; text-align: center; }
        .fav-name { 
            font-weight: 700; font-size: 0.95rem; margin-bottom: 5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        .fav-status { font-size: 0.75rem; color: var(--p); background: rgba(125, 42, 232, 0.1); padding: 2px 8px; border-radius: 5px; }

        #emptyState { text-align: center; padding: 100px 20px; display: none; }
        #loading { text-align: center; padding: 50px; color: var(--p); }

        /* شاشة الجوال */
        @media (max-width: 480px) {
            .fav-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .fav-poster { height: 200px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="i.html" class="logo">IGRIS <span>MANGA</span></a>
        <a href="i.html" style="color: var(--text); font-size: 1.2rem;"><i class="fas fa-home"></i></a>
    </header>

    <div class="container">
        <a href="i.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>

        <div class="page-title">
            <i class="fas fa-heart"></i>
            <h2 style="margin: 0;">مكتبتي المفضلة</h2>
        </div>

        <div id="loading"><i class="fas fa-spinner fa-spin" style="font-size: 2.5rem;"></i></div>

        <div id="emptyState">
            <i class="fas fa-heart-broken" style="font-size: 4rem; color: var(--border); margin-bottom: 20px;"></i>
            <h3>قائمتك فارغة حالياً</h3>
            <p style="opacity: 0.6;">ابدأ بإضافة المانجا التي تحبها لتجدها هنا دائماً.</p>
            <a href="i.html" style="display: inline-block; margin-top: 15px; color: var(--p); text-decoration: none; font-weight: bold;">تصفح المانجا الآن</a>
        </div>

        <div class="fav-grid" id="favGrid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaosiZQoPCo4wdlSDy6UYs0b2PWbkkWXs",
            authDomain: "igrismanga-db.firebaseapp.com",
            databaseURL: "https://igrismanga-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "igrismanga-db",
            storageBucket: "igrismanga-db.appspot.com",
            appId: "1:40861137290:web:03cd9be7175620d4e23073"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // ضبط الثيم
        if (localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');

        onAuthStateChanged(auth, (user) => {
            const grid = document.getElementById('favGrid');
            const loading = document.getElementById('loading');
            const empty = document.getElementById('emptyState');

            if (user) {
                const favRef = ref(db, `users/${user.uid}/favorites`);
                
                onValue(favRef, async (snapshot) => {
                    grid.innerHTML = '';
                    loading.style.display = 'none';

                    if (snapshot.exists()) {
                        const favIds = snapshot.val();
                        const ids = Object.keys(favIds);
                        
                        for (const id of ids) {
                            // جلب تفاصيل كل مانجا من قسم المانجا الرئيسي
                            const mangaSnap = await get(ref(db, `manga/${id}`));
                            if (mangaSnap.exists()) {
                                const m = mangaSnap.val();
                                grid.appendChild(createFavCard(id, m, user.uid));
                            }
                        }
                        empty.style.display = grid.children.length > 0 ? 'none' : 'block';
                    } else {
                        empty.style.display = 'block';
                    }
                });
            } else {
                loading.innerHTML = '<p>يرجى تسجيل الدخول لعرض مفضلاتك</p>';
            }
        });

        function createFavCard(id, m, uid) {
            const card = document.createElement('div');
            card.className = 'fav-item';
            card.innerHTML = `
                <button class="remove-btn" onclick="removeFromFav('${id}', '${uid}')">
                    <i class="fas fa-trash"></i>
                </button>
                <a href="reader.html?id=${id}" style="text-decoration:none; color:inherit;">
                    <div class="fav-poster">
                        <img src="${m.cover}" alt="${m.title}">
                    </div>
                    <div class="fav-info">
                        <div class="fav-name">${m.title}</div>
                        <span class="fav-status">${m.type || 'مانهوا'}</span>
                    </div>
                </a>
            `;
            return card;
        }

        // دالة الحذف
        window.removeFromFav = (mangaId, uid) => {
            if(confirm("هل تريد إزالة هذه المانجا من المفضلات؟")) {
                remove(ref(db, `users/${uid}/favorites/${mangaId}`));
            }
        };
    </script>
</body>
</html>
