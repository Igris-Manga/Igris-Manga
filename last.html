<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igris | History</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --p: #7d2ae8; --p-dark: #5a1cb3; --bg: #050505; 
            --card: rgba(20, 20, 20, 0.8); --text: #ffffff; 
            --border: rgba(255, 255, 255, 0.05); --sub-bg: #111;
            --green: #00ff88; --glow: 0 8px 32px 0 rgba(125, 42, 232, 0.3);
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; 
            margin: 0; padding: 0; transition: 0.3s; min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(125, 42, 232, 0.1), transparent 400px);
        }

        header { 
            background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(10px);
            padding: 15px 5%; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 1.6rem; font-weight: 900; color: var(--text); text-decoration: none; letter-spacing: 1px; }
        .logo span { color: var(--p); text-shadow: 0 0 10px var(--p); }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        .page-header { margin-bottom: 40px; border-right: 4px solid var(--p); padding-right: 20px; }
        .page-header h2 { font-size: 2rem; font-weight: 900; margin: 0; }
        .page-header p { color: #888; margin: 5px 0 0; font-size: 0.9rem; }

        .history-list { display: grid; grid-template-columns: 1fr; gap: 15px; }

        .history-card {
            background: var(--card); backdrop-filter: blur(5px);
            border: 1px solid var(--border); border-radius: 24px;
            display: flex; overflow: hidden; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; animation: slideIn 0.5s ease forwards; opacity: 0;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .history-card:hover { 
            border-color: var(--p); transform: scale(1.01) translateX(-5px);
            box-shadow: var(--glow); background: rgba(30, 30, 30, 0.9);
        }

        .manga-img-link { width: 110px; height: 155px; flex-shrink: 0; overflow: hidden; position: relative; }
        .manga-img-link img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .history-card:hover .manga-img-link img { transform: scale(1.1); filter: brightness(0.7); }

        .history-info { padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: center; text-align: right; }
        .manga-name-link { text-decoration: none; color: var(--text); }
        .manga-name { font-weight: 900; font-size: 1.2rem; margin-bottom: 8px; transition: 0.3s; }
        .history-card:hover .manga-name { color: var(--p); }
        
        .status-row { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; margin-bottom: 15px; flex-direction: row-reverse; }
        .ch-badge { background: rgba(125, 42, 232, 0.2); color: var(--p); padding: 2px 12px; border-radius: 50px; font-weight: bold; border: 1px solid var(--p); }
        
        .progress-wrapper { width: 100%; max-width: 300px; margin-right: 0; margin-left: auto; }
        .progress-container { background: rgba(255,255,255,0.05); height: 8px; border-radius: 10px; overflow: hidden; }
        .progress-bar { 
            background: linear-gradient(90deg, var(--p-dark), var(--p)); 
            height: 100%; width: 0%; border-radius: 10px;
            transition: 1.5s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }
        .progress-bar::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); animation: shine 2s infinite; }

        @keyframes shine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .card-actions { display: flex; align-items: center; padding: 0 30px; }
        .resume-btn {
            width: 55px; height: 55px; border-radius: 18px; 
            background: var(--p); color: white; display: flex; 
            align-items: center; justify-content: center; font-size: 1.4rem; 
            transition: 0.4s; text-decoration: none;
            box-shadow: 0 4px 15px rgba(125, 42, 232, 0.4);
        }
        .resume-btn:hover { 
            background: var(--green); color: #000; transform: rotate(-10deg) scale(1.1);
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.4);
        }

        @media (max-width: 600px) {
            .history-card { border-radius: 15px; }
            .manga-img-link { width: 90px; height: 130px; }
            .history-info { padding: 15px; }
            .manga-name { font-size: 1rem; }
            .card-actions { padding: 0 15px; }
            .resume-btn { width: 45px; height: 45px; font-size: 1.1rem; border-radius: 12px; }
            .progress-wrapper { max-width: 100%; }
        }

        #loading { display: flex; justify-content: center; padding: 100px; color: var(--p); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">IGRIS<span>MANGA</span></a>
        <a href="index.html" style="color: var(--text); background: var(--card); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; text-decoration: none; border: 1px solid var(--border);"><i class="fas fa-home"></i></a>
    </header>

    <div class="container">
        <div class="page-header">
            <h2>آخر القراءات</h2>
            <p>تابع مغامرتك من حيث توقفت</p>
        </div>

        <div id="loading"><i class="fas fa-circle-notch fa-spin fa-3x"></i></div>

        <div id="emptyState" style="display: none; text-align: center; padding: 80px 20px;">
            <div style="font-size: 5rem; color: var(--sub-bg); margin-bottom: 20px;"><i class="fas fa-ghost"></i></div>
            <h3 style="font-size: 1.5rem;">سجلك فارغ تماماً!</h3>
            <p style="color: #666;">ابدأ بقراءة أول مانجا لتظهر هنا.</p>
            <a href="index.html" style="color: var(--p); text-decoration: none; font-weight: bold; margin-top: 20px; display: inline-block;">استكشف المانجا <i class="fas fa-arrow-right"></i></a>
        </div>

        <div class="history-list" id="historyList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaosiZQoPCo4wdlSDy6UYs0b2PWbkkWXs",
            authDomain: "igrismanga-db.firebaseapp.com",
            databaseURL: "https://igrismanga-db-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "igrismanga-db",
            storageBucket: "igrismanga-db.appspot.com",
            appId: "1:40861137290:web:03cd9be7175620d4e23073"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            const list = document.getElementById('historyList');
            const loading = document.getElementById('loading');
            const empty = document.getElementById('emptyState');

            if (user) {
                // الربط مع مسار history الصحيح الذي تم إنشاؤه في الصفحة الرئيسية
                const historyRef = ref(db, `users/${user.uid}/history`);
                onValue(historyRef, async (snapshot) => {
                    if (snapshot.exists()) {
                        list.innerHTML = ''; 
                        loading.style.display = 'none';
                        empty.style.display = 'none';
                        
                        const data = snapshot.val();
                        // ترتيب من الأحدث للأقدم بناءً على التوقيت
                        const sortedData = Object.keys(data).sort((a,b) => data[b].timestamp - data[a].timestamp);

                        for (const id of sortedData) {
                            const entry = data[id];
                            // جلب بيانات المانجا الأصلية لحساب النسبة المئوية
                            const mSnap = await get(ref(db, `manga/${id}`));
                            if (mSnap.exists()) {
                                const mangaData = mSnap.val();
                                const totalCh = mangaData.chapters ? Object.keys(mangaData.chapters).length : 1;
                                const currentCh = entry.chapter || 1;
                                // معادلة التقدم: (الفصل الحالي / إجمالي الفصول) * 100
                                const calcPercent = Math.min(Math.round((currentCh / totalCh) * 100), 100);
                                
                                list.appendChild(createHistoryCard(id, entry, calcPercent));
                            }
                        }
                    } else {
                        loading.style.display = 'none';
                        empty.style.display = 'block';
                    }
                });
            } else {
                loading.style.display = 'none';
                empty.style.display = 'block';
            }
        });

        function createHistoryCard(id, data, percent) {
            const card = document.createElement('div');
            card.className = 'history-card';
            
            const infoLink = `reader.html?id=${id}`;
            const viewLink = `Viewer.html?id=${id}&ch=${data.chapter}`;

            card.innerHTML = `
                <a href="${infoLink}" class="manga-img-link">
                    <img src="${data.cover}" alt="${data.title}" onerror="this.src='https://via.placeholder.com/110x155/111/7d2ae8?text=No+Image'">
                </a>
                <div class="history-info">
                    <a href="${infoLink}" class="manga-name-link">
                        <div class="manga-name">${data.title}</div>
                    </a>
                    <div class="status-row">
                        <span class="ch-badge">فصل ${data.chapter}</span>
                        <span style="color: #666;">•</span>
                        <span style="color: #888;">اكتمل ${percent}%</span>
                    </div>
                    <div class="progress-wrapper">
                        <div class="progress-container">
                            <div class="progress-bar" data-width="${percent}"></div>
                        </div>
                    </div>
                </div>
                <div class="card-actions">
                    <a href="${viewLink}" class="resume-btn" title="استكمال القراءة">
                        <i class="fas fa-play"></i>
                    </a>
                </div>
            `;

            setTimeout(() => {
                const bar = card.querySelector('.progress-bar');
                if (bar) bar.style.width = bar.getAttribute('data-width') + '%';
            }, 200);

            return card;
        }
    </script>
</body>
</html>
